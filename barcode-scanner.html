<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Quét Mã Sinh Viên</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --surface2: #1a2235;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --success: #10b981;
      --danger: #ef4444;
      --text: #f1f5f9;
      --text-muted: #64748b;
      --border: rgba(0,229,255,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative; z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 100px;
    }

    /* Header */
    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,15,30,0.9);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--text-muted); }

    .badge {
      background: rgba(0,229,255,0.1);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
    }

    .stat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Scanner section */
    .scanner-section {
      padding: 20px;
    }

    .scanner-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    .scanner-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .scanner-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .scanner-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-dot.active {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 1.5s infinite;
    }

    #reader {
      width: 100%;
      min-height: 240px;
      background: #000;
    }

    #reader video {
      border-radius: 0 !important;
    }

    /* Scanner overlay corners */
    .scanner-overlay {
      position: absolute;
      top: 50px; left: 0; right: 0;
      height: 240px;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--accent);
      border-style: solid;
    }

    .corner.tl { top: 20px; left: 20%; border-width: 3px 0 0 3px; }
    .corner.tr { top: 20px; right: 20%; border-width: 3px 3px 0 0; }
    .corner.bl { bottom: 20px; left: 20%; border-width: 0 0 3px 3px; }
    .corner.br { bottom: 20px; right: 20%; border-width: 0 3px 3px 0; }

    .scan-line {
      position: absolute;
      left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanline 2s ease-in-out infinite;
      top: 50%;
    }

    @keyframes scanline {
      0% { transform: translateY(-80px); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(80px); opacity: 0; }
    }

    /* Start button */
    .btn-start {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: calc(100% - 40px);
      margin: 20px auto;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent2), #4f46e5);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Noto Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start:active { transform: scale(0.97); }
    .btn-start.scanning { background: linear-gradient(135deg, #ef4444, #dc2626); }

    /* Manual input */
    .manual-section {
      padding: 0 20px 20px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-field {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
    }

    .input-field::placeholder { color: var(--text-muted); }

    .btn-add {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--bg);
      font-size: 22px;
      font-weight: 700;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .btn-add:active { transform: scale(0.92); }

    /* Result notification */
    .result-toast {
      display: none;
      margin: 0 20px 16px;
      padding: 12px 16px;
      border-radius: 10px;
      border-left: 4px solid var(--success);
      background: rgba(16, 185, 129, 0.1);
      font-size: 13px;
      animation: slideIn 0.3s ease;
    }

    .result-toast.error {
      border-left-color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
    }

    @keyframes slideIn {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Student list */
    .list-section {
      padding: 0 20px;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .btn-clear {
      background: none;
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--danger);
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .student-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .student-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .student-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
    }

    @keyframes fadeUp {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .student-index {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      min-width: 24px;
    }

    .student-info {
      flex: 1;
    }

    .student-id {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }

    .student-name {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .student-time {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .btn-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      font-size: 16px;
      line-height: 1;
    }

    .btn-delete:active { color: var(--danger); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-text {
      font-size: 14px;
    }

    /* Bottom export bar */
    .export-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(10,15,30,0.95);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      max-width: 480px;
      margin: 0 auto;
    }

    .btn-export {
      flex: 1;
      background: linear-gradient(135deg, var(--success), #059669);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Noto Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-export:active { transform: scale(0.97); }
    .btn-export:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Name input modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .modal-id {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      color: var(--accent);
      margin-bottom: 20px;
      font-weight: 700;
    }

    .modal-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      margin-bottom: 14px;
    }

    .modal-input:focus { border-color: var(--accent); }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-modal-skip {
      flex: 0 0 80px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      padding: 13px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-modal-save {
      flex: 1;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: var(--bg);
      font-weight: 700;
      font-size: 15px;
      padding: 13px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">SCAN<span>_SV</span></div>
      <div class="badge">v1.0</div>
    </div>
    <div class="subtitle">Quét mã sinh viên · Xuất CSV</div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-dot"></div>
      <span id="count-display">0 sinh viên</span>
    </div>
    <div class="stat" style="color: var(--text-muted); font-size: 11px; margin-left: auto;">
      <span id="session-time">--:--</span>
    </div>
  </div>

  <!-- Scanner -->
  <div class="scanner-section">
    <div class="scanner-card">
      <div class="scanner-header">
        <div class="scanner-title">Camera Scanner</div>
        <div class="scanner-status">
          <div class="status-dot" id="scan-dot"></div>
          <span id="scan-status-text">Tắt</span>
        </div>
      </div>
      <div id="reader"></div>
      <div class="scanner-overlay">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="scan-line" id="scan-line" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- Start/Stop button -->
  <button class="btn-start" id="btn-toggle-scan" onclick="toggleScan()">
    <span>📷</span> Bắt đầu quét
  </button>

  <!-- Toast -->
  <div class="result-toast" id="result-toast"></div>

  <!-- Manual input -->
  <div class="manual-section">
    <div class="section-label">Nhập thủ công</div>
    <div class="input-row">
      <input class="input-field" id="manual-input" placeholder="Nhập MSSV..." type="text" onkeydown="if(event.key==='Enter') addManual()" />
      <button class="btn-add" onclick="addManual()">+</button>
    </div>
  </div>

  <!-- Student list -->
  <div class="list-section">
    <div class="list-header">
      <div class="section-label">Danh sách (<span id="list-count">0</span>)</div>
      <button class="btn-clear" onclick="clearAll()">Xóa tất cả</button>
    </div>
    <div class="student-list" id="student-list">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">Chưa có dữ liệu.<br>Quét hoặc nhập mã sinh viên.</div>
      </div>
    </div>
  </div>

</div>

<!-- Export bar -->
<div class="export-bar">
  <button class="btn-export" id="btn-export" onclick="exportCSV()" disabled>
    <span>⬇️</span> Xuất CSV
  </button>
</div>

<!-- Name input modal -->
<div class="modal-overlay" id="name-modal">
  <div class="modal">
    <div class="modal-title">Nhập tên sinh viên</div>
    <div class="modal-id" id="modal-id-display"></div>
    <input class="modal-input" id="modal-name-input" placeholder="Họ và tên sinh viên (tuỳ chọn)..." type="text"
      onkeydown="if(event.key==='Enter') saveFromModal()" />
    <div class="modal-buttons">
      <button class="btn-modal-skip" onclick="saveFromModal(true)">Bỏ qua</button>
      <button class="btn-modal-save" onclick="saveFromModal(false)">Lưu</button>
    </div>
  </div>
</div>

<script>
  let students = [];
  let html5QrCode = null;
  let isScanning = false;
  let pendingId = null;
  let sessionStart = null;

  // Session timer
  setInterval(() => {
    if (sessionStart) {
      const diff = Math.floor((Date.now() - sessionStart) / 1000);
      const m = String(Math.floor(diff / 60)).padStart(2, '0');
      const s = String(diff % 60).padStart(2, '0');
      document.getElementById('session-time').textContent = m + ':' + s;
    }
  }, 1000);

  function now() {
    return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('result-toast');
    t.textContent = msg;
    t.className = 'result-toast' + (isError ? ' error' : '');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  function addStudent(id, name = '') {
    // Check duplicate
    if (students.find(s => s.id === id)) {
      showToast('⚠️ MSSV ' + id + ' đã tồn tại!', true);
      return false;
    }
    students.unshift({ id, name, time: now() });
    renderList();
    updateStats();
    if (!sessionStart) sessionStart = Date.now();
    return true;
  }

  function renderList() {
    const list = document.getElementById('student-list');
    document.getElementById('list-count').textContent = students.length;
    document.getElementById('btn-export').disabled = students.length === 0;

    if (students.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">Chưa có dữ liệu.<br>Quét hoặc nhập mã sinh viên.</div>
      </div>`;
      return;
    }

    list.innerHTML = students.map((s, i) => `
      <div class="student-item" id="item-${i}">
        <div class="student-index">#${students.length - i}</div>
        <div class="student-info">
          <div class="student-id">${s.id}</div>
          <div class="student-name">${s.name || '<em style="opacity:0.5">Chưa có tên</em>'}</div>
        </div>
        <div class="student-time">${s.time}</div>
        <button class="btn-delete" onclick="deleteStudent(${i})">✕</button>
      </div>
    `).join('');
  }

  function updateStats() {
    document.getElementById('count-display').textContent = students.length + ' sinh viên';
  }

  function deleteStudent(i) {
    students.splice(i, 1);
    renderList();
    updateStats();
  }

  function clearAll() {
    if (students.length === 0) return;
    if (confirm('Xóa tất cả ' + students.length + ' sinh viên?')) {
      students = [];
      sessionStart = null;
      document.getElementById('session-time').textContent = '--:--';
      renderList();
      updateStats();
    }
  }

  // Manual add
  function addManual() {
    const inp = document.getElementById('manual-input');
    const id = inp.value.trim();
    if (!id) return;
    pendingId = id;
    inp.value = '';
    openModal(id);
  }

  // Modal
  function openModal(id) {
    document.getElementById('modal-id-display').textContent = id;
    document.getElementById('modal-name-input').value = '';
    document.getElementById('name-modal').classList.add('active');
    setTimeout(() => document.getElementById('modal-name-input').focus(), 300);
  }

  function saveFromModal(skip = false) {
    const name = skip ? '' : document.getElementById('modal-name-input').value.trim();
    document.getElementById('name-modal').classList.remove('active');
    if (pendingId) {
      const ok = addStudent(pendingId, name);
      if (ok) showToast('✅ Đã lưu: ' + pendingId + (name ? ' — ' + name : ''));
      pendingId = null;
    }
  }

  // Scanner
  async function toggleScan() {
    if (!isScanning) {
      startScan();
    } else {
      stopScan();
    }
  }

  async function startScan() {
    const btn = document.getElementById('btn-toggle-scan');
    btn.innerHTML = '<span>⏹</span> Dừng quét';
    btn.classList.add('scanning');
    document.getElementById('scan-dot').classList.add('active');
    document.getElementById('scan-status-text').textContent = 'Đang quét';
    document.getElementById('scan-line').style.display = 'block';
    isScanning = true;

    html5QrCode = new Html5Qrcode("reader");
    try {
      await html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 220, height: 120 } },
        onScanSuccess,
        () => {}
      );
    } catch (err) {
      showToast('❌ Không thể mở camera: ' + err, true);
      stopScan();
    }
  }

  async function stopScan() {
    const btn = document.getElementById('btn-toggle-scan');
    btn.innerHTML = '<span>📷</span> Bắt đầu quét';
    btn.classList.remove('scanning');
    document.getElementById('scan-dot').classList.remove('active');
    document.getElementById('scan-status-text').textContent = 'Tắt';
    document.getElementById('scan-line').style.display = 'none';
    isScanning = false;

    if (html5QrCode) {
      try { await html5QrCode.stop(); } catch(e) {}
      html5QrCode = null;
    }
  }

  function onScanSuccess(decodedText) {
    if (pendingId) return; // modal đang mở
    // Beep effect
    try {
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}

    stopScan();
    pendingId = decodedText.trim();
    openModal(pendingId);
  }

  // Export CSV
  function exportCSV() {
    if (students.length === 0) return;
    const BOM = '\uFEFF';
    const header = 'STT,MSSV,Họ và tên,Thời gian quét\n';
    const rows = students.map((s, i) =>
      `${students.length - i},"${s.id}","${s.name || ''}","${s.time}"`
    ).join('\n');
    const csv = BOM + header + rows;
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `sinh_vien_${dateStr}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ Đã xuất ' + students.length + ' sinh viên ra file CSV!');
  }

  // Click outside modal to close
  document.getElementById('name-modal').addEventListener('click', function(e) {
    if (e.target === this) saveFromModal(true);
  });
</script>
</body>
</html>
